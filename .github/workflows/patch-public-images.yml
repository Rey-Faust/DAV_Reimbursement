name: Patch receipt image resilience

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-index:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch receipt image loading and persistence
        run: |
          node <<'NODE'
          const fs = require('fs');
          const file = 'index.html';
          let source = fs.readFileSync(file, 'utf8');
          const before = source;

          function block(lines) {
            return lines.join('\n');
          }

          function findFunctionBounds(text, signature) {
            const start = text.indexOf(signature);
            if (start === -1) return null;
            const braceStart = text.indexOf('{', start);
            if (braceStart === -1) return null;

            let depth = 0;
            let quote = null;
            let escaped = false;
            let lineComment = false;
            let blockComment = false;

            for (let i = braceStart; i < text.length; i += 1) {
              const char = text[i];
              const next = text[i + 1];

              if (lineComment) {
                if (char === '\n') lineComment = false;
                continue;
              }
              if (blockComment) {
                if (char === '*' && next === '/') {
                  blockComment = false;
                  i += 1;
                }
                continue;
              }
              if (quote) {
                if (escaped) {
                  escaped = false;
                  continue;
                }
                if (char === '\\') {
                  escaped = true;
                  continue;
                }
                if (char === quote) quote = null;
                continue;
              }

              if (char === '/' && next === '/') {
                lineComment = true;
                i += 1;
                continue;
              }
              if (char === '/' && next === '*') {
                blockComment = true;
                i += 1;
                continue;
              }
              if (char === "'" || char === '"' || char === '`') {
                quote = char;
                continue;
              }
              if (char === '{') depth += 1;
              if (char === '}') {
                depth -= 1;
                if (depth === 0) return { start, end: i + 1 };
              }
            }
            return null;
          }

          function replaceFunction(signature, replacement) {
            const bounds = findFunctionBounds(source, signature);
            if (!bounds) {
              console.log('Function not found:', signature);
              return false;
            }
            source = source.slice(0, bounds.start) + replacement + source.slice(bounds.end);
            return true;
          }

          function insertBefore(marker, content) {
            if (source.includes(content.trim().split('\n')[0].trim())) return false;
            const index = source.indexOf(marker);
            if (index === -1) {
              console.log('Marker not found:', marker);
              return false;
            }
            source = source.slice(0, index) + content + '\n\n' + source.slice(index);
            return true;
          }

          function ensureCss() {
            if (source.includes('.thumb-button.is-missing')) return;
            const css = block([
              '      .thumb-button.is-missing {',
              '        cursor: not-allowed;',
              '        border-color: rgba(216, 109, 34, 0.28);',
              '        background: rgba(216, 109, 34, 0.12);',
              '        color: #9e4710;',
              '      }',
              '',
              '      .thumb-missing {',
              '        width: 100%;',
              '        height: 100%;',
              '        display: grid;',
              '        place-items: center;',
              '        padding: 4px;',
              '        font-size: 0.68rem;',
              '        font-weight: 700;',
              '        line-height: 1.15;',
              '        text-align: center;',
              '      }',
              '',
            ]);
            const thumbImageRule = /(\n      \.thumb-button img \{[\s\S]*?\n      \}\n)/;
            if (thumbImageRule.test(source)) {
              source = source.replace(thumbImageRule, '$1' + css);
            } else {
              source = source.replace('</style>', css + '    </style>');
            }
          }

          ensureCss();

          replaceFunction(
            'async function getSignedImageUrl(path)',
            block([
              '      async function getSignedImageUrl(path) {',
              "        const cleanValue = String(path || '').trim();",
              "        if (!cleanValue) return '';",
              '',
              '        const extractStoragePath = function (value) {',
              "          if (!/^https?:\\/\\//i.test(value)) return value;",
              '          try {',
              '            const parsed = new URL(value);',
              "            const publicPrefix = '/storage/v1/object/public/' + APP_CONFIG.STORAGE_BUCKET + '/';",
              "            const signedPrefix = '/storage/v1/object/sign/' + APP_CONFIG.STORAGE_BUCKET + '/';",
              '            if (parsed.pathname.includes(publicPrefix)) {',
              "              return decodeURIComponent(parsed.pathname.split(publicPrefix)[1] || '');",
              '            }',
              '            if (parsed.pathname.includes(signedPrefix)) {',
              "              return decodeURIComponent(parsed.pathname.split(signedPrefix)[1] || '');",
              '            }',
              '          } catch (error) {',
              "            console.error('Receipt image path parse failed:', error);",
              '          }',
              '          return value;',
              '        };',
              '',
              '        const cleanPath = extractStoragePath(cleanValue);',
              '        if (/^(https?:|data:|blob:)/i.test(cleanPath)) return cleanPath;',
              "        if (!supabaseClient) return '';",
              '',
              '        const cached = state.signedUrlCache.get(cleanPath);',
              '        if (cached && Date.now() < cached.expiresAt) {',
              '          return cached.url;',
              '        }',
              '',
              '        try {',
              '          const result = await supabaseClient.storage',
              '            .from(APP_CONFIG.STORAGE_BUCKET)',
              '            .createSignedUrl(cleanPath, SIGNED_URL_TTL_SECONDS);',
              '          if (result.error) {',
              '            throw new Error(result.error.message);',
              '          }',
              "          const signedUrl = result.data && result.data.signedUrl ? result.data.signedUrl : '';",
              '          if (signedUrl) {',
              '            state.signedUrlCache.set(cleanPath, { url: signedUrl, expiresAt: Date.now() + SIGNED_URL_CACHE_TTL });',
              '          }',
              '          return signedUrl;',
              '        } catch (error) {',
              "          const message = error instanceof Error ? error.message : String(error || '');",
              "          console.error('Receipt image URL failed:', error);",
              '          if (/object not found|bucket not found|not found|404/i.test(message)) {',
              "            state.signedUrlCache.set(cleanPath, { url: '', expiresAt: Date.now() + SIGNED_URL_CACHE_TTL });",
              "            return '';",
              '          }',
              '          const publicResult = supabaseClient.storage.from(APP_CONFIG.STORAGE_BUCKET).getPublicUrl(cleanPath);',
              "          const publicUrl = publicResult.data && publicResult.data.publicUrl ? publicResult.data.publicUrl : '';",
              '          if (publicUrl) {',
              '            state.signedUrlCache.set(cleanPath, { url: publicUrl, expiresAt: Date.now() + SIGNED_URL_CACHE_TTL });',
              '            return publicUrl;',
              '          }',
              "          return '';",
              '        }',
              '      }',
            ]),
          );

          const hydrateBounds = findFunctionBounds(source, 'async function hydrateSignedImageUrls(records)');
          if (hydrateBounds) {
            const hydrateBlock = source.slice(hydrateBounds.start, hydrateBounds.end)
              .replace(/\s*\|\|\s*!state\.entryAuthorized/g, '')
              .replace(/!state\.entryAuthorized\s*\|\|\s*/g, '');
            source = source.slice(0, hydrateBounds.start) + hydrateBlock + source.slice(hydrateBounds.end);
          } else {
            console.log('Function not found: async function hydrateSignedImageUrls(records)');
          }

          insertBefore(
            '      function openLightbox(imageUrl)',
            block([
              '      let receiptImageFailureHandlerBound = false;',
              '',
              '      function markReceiptImageMissing(imageElement) {',
              '        if (!imageElement || !imageElement.closest) return;',
              "        const button = imageElement.closest('.thumb-button');",
              "        if (!button || button.classList.contains('is-missing')) return;",
              "        button.classList.add('is-missing');",
              "        button.removeAttribute('data-image-url');",
              '        button.disabled = true;',
              "        button.title = '\\u56fe\\u7247\\u6587\\u4ef6\\u7f3a\\u5931\\uff0c\\u8bf7\\u91cd\\u65b0\\u4e0a\\u4f20\\u62a5\\u9500\\u56fe\\u7247';",
              "        button.setAttribute('aria-label', '\\u56fe\\u7247\\u6587\\u4ef6\\u7f3a\\u5931');",
              '        button.innerHTML = \'<span class="thumb-missing">\\u7f3a\\u56fe</span>\';',
              '      }',
              '',
              '      function bindReceiptImageFailureHandling() {',
              '        if (receiptImageFailureHandlerBound) return;',
              '        receiptImageFailureHandlerBound = true;',
              '        document.addEventListener(',
              "          'error',",
              '          function (event) {',
              "            if (event.target instanceof HTMLImageElement && event.target.closest('.thumb-button')) {",
              '              markReceiptImageMissing(event.target);',
              '            }',
              '          },',
              '          true,',
              '        );',
              '      }',
            ]),
          );

          if (source.includes('function bindEvents() {') && !source.includes('bindReceiptImageFailureHandling();')) {
            source = source.replace('      function bindEvents() {', '      function bindEvents() {\n        bindReceiptImageFailureHandling();');
          }

          insertBefore(
            '      async function uploadReceiptImages(files)',
            block([
              '      async function verifyStoredReceiptImages(paths) {',
              '        if (!supabaseClient) return;',
              '        const cleanPaths = (Array.isArray(paths) ? paths : [paths])',
              '          .map(function (path) {',
              "            return String(path || '').trim();",
              '          })',
              '          .filter(function (path) {',
              '            return path && !/^(https?:|data:|blob:)/i.test(path);',
              '          });',
              '        if (!cleanPaths.length) return;',
              '',
              '        const missingPaths = [];',
              '        await Promise.all(',
              '          cleanPaths.map(async function (path) {',
              '            try {',
              '              const result = await supabaseClient.storage.from(APP_CONFIG.STORAGE_BUCKET).createSignedUrl(path, 60);',
              '              if (result.error || !result.data || !result.data.signedUrl) {',
              '                missingPaths.push(path);',
              '              }',
              '            } catch (error) {',
              "              console.error('Receipt upload verification failed:', error);",
              '              missingPaths.push(path);',
              '            }',
              '          }),',
              '        );',
              '',
              '        if (missingPaths.length) {',
              "          throw new Error('\\u56fe\\u7247\\u4e0a\\u4f20\\u6821\\u9a8c\\u5931\\u8d25\\uff1aSupabase Storage \\u4e2d\\u627e\\u4e0d\\u5230 ' + missingPaths.length + ' \\u4e2a\\u6587\\u4ef6\\uff0c\\u8bf7\\u91cd\\u65b0\\u4e0a\\u4f20\\u3002');",
              '        }',
              '      }',
            ]),
          );

          const uploadBounds = findFunctionBounds(source, 'async function uploadReceiptImages(files)');
          if (uploadBounds) {
            let uploadBlock = source.slice(uploadBounds.start, uploadBounds.end);
            if (!uploadBlock.includes('verifyStoredReceiptImages(')) {
              const pathVariable = ['imagePaths', 'uploadedPaths', 'paths'].find(function (name) {
                return new RegExp('\\b' + name + '\\b').test(uploadBlock);
              });
              if (pathVariable) {
                uploadBlock = uploadBlock.replace(/(\n\s*return\s+\{)/, '\n          await verifyStoredReceiptImages(' + pathVariable + ');$1');
                source = source.slice(0, uploadBounds.start) + uploadBlock + source.slice(uploadBounds.end);
              } else {
                console.log('Could not find upload path variable for verification.');
              }
            }
          } else {
            console.log('Function not found: async function uploadReceiptImages(files)');
          }

          if (source === before) {
            console.log('No index.html changes were needed.');
            process.exit(0);
          }

          fs.writeFileSync(file, source);
          NODE

          if git diff --quiet -- index.html; then
            echo "No index.html diff."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Harden receipt image loading and uploads"
          git push
