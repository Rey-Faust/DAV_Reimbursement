name: Patch receipt image resilience

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-index:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Normalize receipt image fallback labels
        run: |
          node <<'NODE'
          const fs = require('fs');
          const file = 'index.html';
          let source = fs.readFileSync(file, 'utf8');
          const before = source;

          const replacements = [
            ['\\\\u56fe\\\\u7247\\\\u6587\\\\u4ef6\\\\u7f3a\\\\u5931\\\\uff0c\\\\u8bf7\\\\u91cd\\\\u65b0\\\\u4e0a\\\\u4f20\\\\u62a5\\\\u9500\\\\u56fe\\\\u7247', '图片文件缺失，请重新上传报销图片'],
            ['\\\\u56fe\\\\u7247\\\\u6587\\\\u4ef6\\\\u7f3a\\\\u5931', '图片文件缺失'],
            ['\\\\u7f3a\\\\u56fe', '缺图'],
            ['\\\\u56fe\\\\u7247\\\\u4e0a\\\\u4f20\\\\u6821\\\\u9a8c\\\\u5931\\\\u8d25\\\\uff1aSupabase Storage \\\\u4e2d\\\\u627e\\\\u4e0d\\\\u5230', '图片上传校验失败：Supabase Storage 中找不到'],
            ['\\\\u4e2a\\\\u6587\\\\u4ef6\\\\uff0c\\\\u8bf7\\\\u91cd\\\\u65b0\\\\u4e0a\\\\u4f20\\\\u3002', '个文件，请重新上传。'],
          ];

          for (const [doubleEscaped, readable] of replacements) {
            const singleEscaped = doubleEscaped.replaceAll('\\\\', '\\');
            source = source.replaceAll(doubleEscaped, readable).replaceAll(singleEscaped, readable);
          }

          if (source === before) {
            console.log('No label normalization was needed.');
            process.exit(0);
          }

          fs.writeFileSync(file, source);
          NODE

          if git diff --quiet -- index.html; then
            echo "No index.html diff."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Normalize receipt image fallback labels"
          git push
