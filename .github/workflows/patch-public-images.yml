name: Patch public image reads

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch receipt image hydration
        run: |
          node <<'NODE'
          const fs = require('fs');
          const file = 'index.html';
          let source = fs.readFileSync(file, 'utf8');
          const before = source;

          function findFunctionBounds(text, signature) {
            const start = text.indexOf(signature);
            if (start === -1) return null;
            const braceStart = text.indexOf('{', start);
            if (braceStart === -1) return null;

            let depth = 0;
            let quote = null;
            let escaped = false;
            let lineComment = false;
            let blockComment = false;

            for (let i = braceStart; i < text.length; i += 1) {
              const char = text[i];
              const next = text[i + 1];

              if (lineComment) {
                if (char === '\n') lineComment = false;
                continue;
              }
              if (blockComment) {
                if (char === '*' && next === '/') {
                  blockComment = false;
                  i += 1;
                }
                continue;
              }
              if (quote) {
                if (escaped) {
                  escaped = false;
                  continue;
                }
                if (char === '\\') {
                  escaped = true;
                  continue;
                }
                if (char === quote) quote = null;
                continue;
              }

              if (char === '/' && next === '/') {
                lineComment = true;
                i += 1;
                continue;
              }
              if (char === '/' && next === '*') {
                blockComment = true;
                i += 1;
                continue;
              }
              if (char === "'" || char === '"' || char === '`') {
                quote = char;
                continue;
              }
              if (char === '{') depth += 1;
              if (char === '}') {
                depth -= 1;
                if (depth === 0) return { start, end: i + 1 };
              }
            }
            return null;
          }

          function replaceFunction(signature, replacement) {
            const bounds = findFunctionBounds(source, signature);
            if (!bounds) {
              console.log('Function not found:', signature);
              return false;
            }
            source = source.slice(0, bounds.start) + replacement + source.slice(bounds.end);
            return true;
          }

          replaceFunction('async function getSignedImageUrl(path)', `async function getSignedImageUrl(path) {
        const cleanValue = String(path || '').trim();
        if (!cleanValue) return '';

        const extractStoragePath = function (value) {
          if (!/^https?:\/\//i.test(value)) return value;
          try {
            const parsed = new URL(value);
            const publicPrefix = '/storage/v1/object/public/' + APP_CONFIG.STORAGE_BUCKET + '/';
            const signedPrefix = '/storage/v1/object/sign/' + APP_CONFIG.STORAGE_BUCKET + '/';
            if (parsed.pathname.includes(publicPrefix)) {
              return decodeURIComponent(parsed.pathname.split(publicPrefix)[1] || '');
            }
            if (parsed.pathname.includes(signedPrefix)) {
              return decodeURIComponent(parsed.pathname.split(signedPrefix)[1] || '');
            }
          } catch (error) {
            console.error('Receipt image path parse failed:', error);
          }
          return value;
        };

        const cleanPath = extractStoragePath(cleanValue);
        if (/^(https?:|data:|blob:)/i.test(cleanPath)) return cleanPath;
        if (!supabaseClient) return '';

        const cached = state.signedUrlCache.get(cleanPath);
        if (cached && Date.now() < cached.expiresAt) {
          return cached.url;
        }

        try {
          const result = await supabaseClient.storage
            .from(APP_CONFIG.STORAGE_BUCKET)
            .createSignedUrl(cleanPath, SIGNED_URL_TTL_SECONDS);
          if (result.error) {
            throw new Error(result.error.message);
          }
          const signedUrl = result.data && result.data.signedUrl ? result.data.signedUrl : '';
          if (signedUrl) {
            state.signedUrlCache.set(cleanPath, { url: signedUrl, expiresAt: Date.now() + SIGNED_URL_CACHE_TTL });
          }
          return signedUrl;
        } catch (error) {
          console.error('Receipt image URL failed:', error);
          const publicResult = supabaseClient.storage.from(APP_CONFIG.STORAGE_BUCKET).getPublicUrl(cleanPath);
          const publicUrl = publicResult.data && publicResult.data.publicUrl ? publicResult.data.publicUrl : '';
          if (publicUrl) {
            state.signedUrlCache.set(cleanPath, { url: publicUrl, expiresAt: Date.now() + SIGNED_URL_CACHE_TTL });
            return publicUrl;
          }
          return '';
        }
      }`);

          const hydrateBounds = findFunctionBounds(source, 'async function hydrateSignedImageUrls(records)');
          if (hydrateBounds) {
            const hydrateBlock = source.slice(hydrateBounds.start, hydrateBounds.end)
              .replace(/\s*\|\|\s*!state\.entryAuthorized/g, '')
              .replace(/!state\.entryAuthorized\s*\|\|\s*/g, '');
            source = source.slice(0, hydrateBounds.start) + hydrateBlock + source.slice(hydrateBounds.end);
          } else {
            console.log('Function not found: async function hydrateSignedImageUrls(records)');
          }

          if (source === before) {
            console.log('No index.html changes were needed.');
            process.exit(0);
          }

          fs.writeFileSync(file, source);
          NODE

          if git diff --quiet -- index.html; then
            echo "No index.html diff."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Harden read-only receipt image loading"
          git push
