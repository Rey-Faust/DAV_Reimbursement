name: Patch public image reads

on:
  push:
    paths:
      - .github/workflows/patch-public-images.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch image URL hydration
        run: |
          node <<'NODE'
          const fs = require('fs');
          const file = 'index.html';
          let source = fs.readFileSync(file, 'utf8');
          const before = source;

          source = source.replace(
            "if (!cleanPath || !supabaseClient || !state.entryAuthorized) return '';",
            "if (!cleanPath || !supabaseClient) return '';"
          );

          const hydrateStart = source.indexOf('async function hydrateSignedImageUrls');
          if (hydrateStart !== -1) {
            const hydrateEnd = source.indexOf('\n      async function', hydrateStart + 1);
            const end = hydrateEnd === -1 ? source.length : hydrateEnd;
            const hydrateBlock = source.slice(hydrateStart, end).replace(
              "if (!supabaseClient || !state.entryAuthorized) return;",
              "if (!supabaseClient) return;"
            );
            source = source.slice(0, hydrateStart) + hydrateBlock + source.slice(end);
          }

          const signedMarker = '.createSignedUrl(cleanPath, SIGNED_URL_TTL_SECONDS);';
          const signedMarkerIndex = source.indexOf(signedMarker);
          const fallbackMarker = 'getPublicUrl(cleanPath)';
          if (signedMarkerIndex !== -1 && !source.includes(fallbackMarker)) {
            const errorStart = source.indexOf('if (result.error)', signedMarkerIndex);
            const nextSignedUrl = source.indexOf('const signedUrl', errorStart);
            if (errorStart !== -1 && nextSignedUrl !== -1) {
              const fallbackBlock = `if (result.error) {
            const publicResult = supabaseClient.storage.from(APP_CONFIG.STORAGE_BUCKET).getPublicUrl(cleanPath);
            const publicUrl = publicResult.data && publicResult.data.publicUrl ? publicResult.data.publicUrl : '';
            if (publicUrl) {
              state.signedUrlCache.set(cleanPath, { url: publicUrl, expiresAt: Date.now() + SIGNED_URL_CACHE_TTL });
              return publicUrl;
            }
            throw new Error(result.error.message);
          }

          `;
              source = source.slice(0, errorStart) + fallbackBlock + source.slice(nextSignedUrl);
            }
          }

          if (source === before) {
            console.log('No image hydration patch was needed.');
            process.exit(0);
          }

          fs.writeFileSync(file, source);
          NODE

          if git diff --quiet -- index.html; then
            echo "No index.html diff."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Add public URL fallback for receipts"
          git push
