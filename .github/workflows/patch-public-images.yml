name: Patch public image reads

on:
  push:
    paths:
      - .github/workflows/patch-public-images.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch image URL hydration
        run: |
          node <<'NODE'
          const fs = require('fs');
          const file = 'index.html';
          let source = fs.readFileSync(file, 'utf8');
          const before = source;

          source = source.replace(
            "if (!cleanPath || !supabaseClient || !state.entryAuthorized) return '';",
            "if (!cleanPath || !supabaseClient) return '';"
          );

          source = source.replace(
            "if (!supabaseClient || !state.entryAuthorized) return;",
            "if (!supabaseClient) return;"
          );

          source = source.replace(
            /(const result = await supabaseClient\.storage\s*\.from\(APP_CONFIG\.STORAGE_BUCKET\)\s*\.createSignedUrl\(cleanPath, SIGNED_URL_TTL_SECONDS\);\s*)if \(result\.error\) \{\s*throw new Error\(result\.error\.message\);\s*\}/,
            function (_match, prefix) {
              return prefix + `if (result.error) {
            const publicResult = supabaseClient.storage.from(APP_CONFIG.STORAGE_BUCKET).getPublicUrl(cleanPath);
            const publicUrl = publicResult.data && publicResult.data.publicUrl ? publicResult.data.publicUrl : '';
            if (publicUrl) {
              state.signedUrlCache.set(cleanPath, { url: publicUrl, expiresAt: Date.now() + SIGNED_URL_CACHE_TTL });
              return publicUrl;
            }
            throw new Error(result.error.message);
          }`;
            }
          );

          if (source === before) {
            console.log('No image hydration patch was needed.');
            process.exit(0);
          }

          fs.writeFileSync(file, source);
          NODE

          if git diff --quiet -- index.html; then
            echo "No index.html diff."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Allow read-only users to view Supabase images"
          git push
