name: Patch admin login email

on:
  push:
    paths:
      - .github/workflows/patch-admin-login.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch admin auth email
        run: |
          perl -0pi -e 's/admin\@dav\.local/reyreyfaust\@gmail.com/g' index.html
          if git diff --quiet -- index.html; then
            echo "No admin@dav.local mapping found; nothing to patch."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Map Admin login to Gmail auth user"
          git push
