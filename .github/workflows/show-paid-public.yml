name: Show paid records publicly

on:
  push:
    paths:
      - .github/workflows/show-paid-public.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
      - name: Patch index.html and remove this workflow
        working-directory: repo
        run: |
          python3 - <<'PY'
          from pathlib import Path

          index_path = Path('index.html')
          text = index_path.read_text()
          old = "        if (!state.entryAuthorized) {\n          nextQuery = nextQuery.or('status.is.null,status.neq.已报销');\n        }\n"
          if old in text:
              index_path.write_text(text.replace(old, '', 1))

          workflow_path = Path('.github/workflows/show-paid-public.yml')
          if workflow_path.exists():
              workflow_path.unlink()
          PY
      - name: Commit and push
        working-directory: repo
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/show-paid-public.yml
          git commit -m "Show reimbursed records in public view"
          git push origin HEAD:main
