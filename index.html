<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="DAV construction 斯里兰卡报销管理系统，支持图片上传、日期筛选与 CSV 下载。"
    />
    <title>DAV construction · 报销系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif;
        color: #17202d;
        background:
          radial-gradient(circle at top left, rgba(246, 159, 67, 0.16), transparent 28%),
          linear-gradient(180deg, #f8efe1 0%, #f4f0e6 48%, #eef1f3 100%);
        --bg-panel: rgba(255, 255, 255, 0.78);
        --bg-panel-strong: rgba(255, 255, 255, 0.94);
        --border-color: rgba(23, 32, 45, 0.08);
        --accent: #d86d22;
        --accent-dark: #9e4710;
        --ink: #17202d;
        --muted: #617181;
        --success: #1d7a53;
        --warning: #b35f18;
        --shadow: 0 22px 60px rgba(34, 42, 51, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-width: 320px;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
      }

      a {
        color: inherit;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      input,
      select {
        width: 100%;
        border: 1px solid rgba(23, 32, 45, 0.12);
        background: rgba(255, 255, 255, 0.92);
        color: var(--ink);
        border-radius: 16px;
        padding: 0.86rem 0.95rem;
        transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
      }

      input:focus,
      select:focus {
        outline: none;
        border-color: rgba(216, 109, 34, 0.5);
        box-shadow: 0 0 0 4px rgba(216, 109, 34, 0.12);
      }

      .page-shell {
        width: min(1440px, calc(100% - 32px));
        margin: 0 auto;
        padding: 14px 0 76px;
      }

      .hero {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: center;
        margin-bottom: 10px;
        padding: 0 4px;
      }

      .eyebrow,
      .section-kicker {
        margin: 0;
        font-size: 0.76rem;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: var(--accent-dark);
      }

      h1,
      h2,
      h3 {
        margin: 0;
        font-family: 'Space Grotesk', 'Avenir Next', sans-serif;
        letter-spacing: -0.04em;
      }

      h1 {
        font-size: clamp(1.05rem, 2.2vw, 1.5rem);
        line-height: 1;
      }

      .brand-dav {
        display: inline-block;
        padding: 0 6px;
        border-radius: 8px;
        color: var(--accent-dark);
        background: rgba(216, 109, 34, 0.18);
        box-shadow: inset 0 -1px 0 rgba(158, 71, 16, 0.28);
      }

      h2 {
        font-size: 1.5rem;
      }

      h3 {
        font-size: 1.2rem;
      }

      .panel-note,
      .fx-meta,
      .config-note {
        color: var(--muted);
      }

      .hero-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .connection-indicator {
        width: 32px;
        height: 32px;
        display: inline-grid;
        place-items: center;
        position: relative;
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid rgba(23, 32, 45, 0.08);
        border-radius: 12px;
        box-shadow: 0 10px 20px rgba(23, 32, 45, 0.12);
        color: #7b8794;
      }

      .connection-indicator svg {
        width: 14px;
        height: 14px;
      }

      .connection-indicator::after {
        content: '';
        position: absolute;
        right: 5px;
        bottom: 5px;
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #b35f18;
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.9);
      }

      .connection-indicator.is-connected {
        color: #1d7a53;
      }

      .connection-indicator.is-connected::after {
        background: #1d7a53;
      }

      .connection-indicator.is-error {
        color: #b42318;
      }

      .connection-indicator.is-error::after {
        background: #b42318;
      }

      .hero-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }

      .panel {
        position: relative;
        overflow: hidden;
        border: 1px solid var(--border-color);
        border-radius: 26px;
        background: var(--bg-panel);
        backdrop-filter: blur(14px);
        box-shadow: var(--shadow);
      }

      .panel::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.42), transparent 40%);
        pointer-events: none;
      }

      .panel-form,
      .panel-table {
        padding: 24px;
      }

      .panel-head {
        position: relative;
        z-index: 1;
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
        margin-bottom: 22px;
      }

      .compact-head {
        align-items: center;
      }

      .dashboard {
        display: block;
      }

      .table-head {
        gap: 8px;
        margin-bottom: 12px;
        align-items: center;
      }

      .table-heading {
        display: inline-flex;
        align-items: baseline;
        gap: 8px;
        flex: 0 0 auto;
        white-space: nowrap;
      }

      .table-heading .section-kicker {
        font-size: 0.72rem;
        letter-spacing: 0.14em;
      }

      .table-heading h2 {
        font-size: 1.02rem;
        letter-spacing: -0.02em;
      }

      .entry-toggle {
        width: 36px;
        height: 36px;
        display: inline-grid;
        place-items: center;
        padding: 0;
        background: linear-gradient(135deg, #17202d 0%, #31445b 100%);
        color: #fff;
        box-shadow: 0 10px 22px rgba(23, 32, 45, 0.18);
      }

      .entry-toggle svg {
        width: 16px;
        height: 16px;
      }

      .entry-drawer {
        margin-bottom: 0;
        max-height: 0;
        opacity: 0;
        padding: 0;
        border-width: 0;
        box-shadow: none;
        transform: translateY(-12px);
        pointer-events: none;
        transition: max-height 260ms ease, opacity 220ms ease, transform 220ms ease;
      }

      .entry-drawer.is-open {
        max-height: 920px;
        opacity: 1;
        margin-bottom: 22px;
        padding: 24px;
        border-width: 1px;
        box-shadow: var(--shadow);
        transform: translateY(0);
        pointer-events: auto;
      }

      .entry-drawer .panel-head {
        margin-bottom: 18px;
      }

      .toolbar {
        display: flex;
        flex-wrap: nowrap;
        gap: 6px;
        align-items: center;
        flex: 1 1 auto;
        overflow-x: auto;
        padding-bottom: 2px;
        -webkit-overflow-scrolling: touch;
      }

      .toolbar label {
        display: block;
        min-width: 138px;
        flex: 0 0 auto;
      }

      .toolbar input {
        height: 34px;
        border-radius: 12px;
        padding: 0.5rem 0.66rem;
      }

      .toolbar-icon {
        width: 36px;
        min-width: 36px;
        height: 36px;
        min-height: 36px;
        padding: 0;
        border-radius: 12px;
        display: inline-grid;
        place-items: center;
        flex: 0 0 auto;
      }

      .toolbar-icon svg {
        width: 16px;
        height: 16px;
        pointer-events: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .expense-form {
        position: relative;
        z-index: 1;
        display: grid;
        gap: 14px;
      }

      .form-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .expense-form label,
      .toolbar label,
      .fx-controls label {
        display: grid;
        gap: 8px;
      }

      .expense-form span,
      .toolbar span,
      .fx-controls span {
        font-size: 0.88rem;
        color: var(--muted);
      }

      .primary-button,
      .secondary-button,
      .ghost-button,
      .icon-button,
      .lightbox-close,
      .fx-fab {
        border-radius: 16px;
        transition: transform 180ms ease, box-shadow 180ms ease, opacity 180ms ease;
      }

      .primary-button,
      .secondary-button,
      .ghost-button {
        min-height: 36px;
        padding: 0 12px;
        font-weight: 600;
        font-size: 0.88rem;
      }

      .primary-button {
        color: #fff;
        background: linear-gradient(135deg, #d86d22 0%, #b85017 100%);
        box-shadow: 0 14px 30px rgba(216, 109, 34, 0.24);
      }

      .secondary-button {
        background: rgba(23, 32, 45, 0.08);
        color: var(--ink);
      }

      .ghost-button,
      .icon-button,
      .lightbox-close {
        background: rgba(255, 255, 255, 0.74);
        color: var(--ink);
        border: 1px solid rgba(23, 32, 45, 0.08);
      }

      .primary-button:hover,
      .secondary-button:hover,
      .ghost-button:hover,
      .icon-button:hover,
      .lightbox-close:hover,
      .fx-fab:hover {
        transform: translateY(-1px);
      }

      .primary-button:disabled,
      .secondary-button:disabled,
      .ghost-button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .file-field input {
        padding: 0.75rem;
      }

      .image-preview {
        display: grid;
        place-items: center;
        min-height: 168px;
        border-radius: 20px;
        border: 1px dashed rgba(23, 32, 45, 0.14);
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.7), rgba(246, 159, 67, 0.08));
        color: var(--muted);
        text-align: center;
        overflow: hidden;
      }

      .image-preview img {
        width: 100%;
        height: 168px;
        object-fit: cover;
      }

      .config-note {
        margin: 0;
        font-size: 0.84rem;
      }

      .summary-strip {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
      }

      .summary-item {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.82);
        border: 1px solid rgba(23, 32, 45, 0.08);
      }

      .summary-item span {
        font-size: 0.8rem;
        color: var(--muted);
      }

      .summary-item strong {
        font-size: 0.9rem;
      }

      .summary-status strong {
        font-size: 0.85rem;
      }

      .hidden {
        display: none !important;
      }

      .table-wrap {
        overflow: auto;
        border-radius: 22px;
        border: 1px solid rgba(23, 32, 45, 0.08);
        background: var(--bg-panel-strong);
      }

      .expense-table {
        width: 100%;
        min-width: 760px;
        border-collapse: collapse;
      }

      .expense-table.is-auth-locked .action-column {
        display: none;
      }

      .expense-table thead th {
        position: sticky;
        top: 0;
        background: rgba(23, 32, 45, 0.9);
        color: #f6f7f8;
        text-align: left;
        padding: 16px 18px;
        font-size: 0.86rem;
        letter-spacing: 0.04em;
      }

      .expense-table tbody td {
        padding: 16px 18px;
        border-bottom: 1px solid rgba(23, 32, 45, 0.08);
        vertical-align: middle;
      }

      .expense-table tbody tr:hover {
        background: rgba(246, 159, 67, 0.08);
      }

      .amount-cell {
        font-variant-numeric: tabular-nums;
        font-weight: 600;
      }

      .status-cell {
        white-space: nowrap;
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 0.78rem;
        line-height: 1.15;
        background: rgba(23, 32, 45, 0.08);
        color: var(--muted);
      }

      .status-badge.is-ok {
        background: rgba(29, 122, 83, 0.14);
        color: #1d7a53;
      }

      .status-badge.is-pending {
        background: rgba(216, 109, 34, 0.14);
        color: #9e4710;
      }

      .status-select {
        min-width: 86px;
        width: auto;
        max-width: 140px;
        height: 30px;
        padding: 0 22px 0 8px;
        border-radius: 10px;
        border: 1px solid rgba(23, 32, 45, 0.14);
        background: rgba(255, 255, 255, 0.92);
        font-size: 0.78rem;
        color: var(--ink);
      }

      .status-select:disabled {
        opacity: 0.65;
        cursor: wait;
      }

      .person-cell {
        min-width: 110px;
      }

      .person-input {
        width: 112px;
        max-width: 150px;
        height: 30px;
        padding: 0 8px;
        border-radius: 10px;
        border: 1px solid rgba(23, 32, 45, 0.14);
        background: rgba(255, 255, 255, 0.92);
        font-size: 0.78rem;
        color: var(--ink);
      }

      .person-input:disabled {
        opacity: 0.65;
        cursor: wait;
      }

      .muted-text,
      .empty-row {
        color: var(--muted);
      }

      .empty-row {
        text-align: center;
        padding: 48px 18px;
      }

      .thumb-button {
        width: 46px;
        height: 46px;
        padding: 0;
        border-radius: 12px;
        border: 1px solid rgba(23, 32, 45, 0.08);
        overflow: hidden;
        background: rgba(255, 255, 255, 0.85);
      }

      .thumb-button img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .row-actions {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .row-action-button {
        width: 30px;
        height: 30px;
        padding: 0;
        border-radius: 10px;
        border: 1px solid rgba(23, 32, 45, 0.12);
        background: rgba(255, 255, 255, 0.82);
        color: var(--ink);
        display: inline-grid;
        place-items: center;
      }

      .row-action-button svg {
        width: 14px;
        height: 14px;
        pointer-events: none;
      }

      .row-action-button.is-danger {
        color: #b42318;
      }

      .row-action-button.is-locked {
        color: var(--muted);
      }

      .fx-fab {
        position: fixed;
        right: 26px;
        bottom: 26px;
        width: 46px;
        height: 46px;
        display: inline-grid;
        place-items: center;
        color: #fff;
        background: linear-gradient(135deg, #d86d22 0%, #b85017 100%);
        border: 1px solid rgba(255, 255, 255, 0.64);
        box-shadow:
          0 16px 34px rgba(184, 80, 23, 0.38),
          0 0 0 2px rgba(255, 255, 255, 0.68);
        z-index: 20;
      }

      .fx-fab svg {
        width: 19px;
        height: 19px;
      }

      .fx-panel {
        position: fixed;
        right: 26px;
        bottom: 110px;
        width: min(360px, calc(100vw - 28px));
        padding: 20px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid rgba(23, 32, 45, 0.08);
        box-shadow: 0 24px 70px rgba(23, 32, 45, 0.18);
        transform: translateY(18px) scale(0.96);
        opacity: 0;
        pointer-events: none;
        transition: opacity 220ms ease, transform 220ms ease;
        z-index: 20;
      }

      .fx-panel.is-open {
        transform: translateY(0) scale(1);
        opacity: 1;
        pointer-events: auto;
      }

      .fx-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: start;
        margin-bottom: 14px;
      }

      .icon-button,
      .lightbox-close {
        width: 38px;
        height: 38px;
        font-size: 1.4rem;
      }

      .fx-controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 16px;
      }

      .fx-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 12px;
      }

      .fx-card {
        padding: 14px;
        border-radius: 18px;
        background: rgba(23, 32, 45, 0.06);
      }

      .fx-card span {
        display: block;
        color: var(--muted);
        margin-bottom: 8px;
        font-size: 0.82rem;
      }

      .fx-card strong {
        font-size: 1.1rem;
      }

      .page-note {
        margin: 10px 4px 0;
        font-size: 0.76rem;
        color: var(--muted);
        text-align: center;
        opacity: 0.9;
      }

      .auth-modal {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: rgba(7, 10, 14, 0.56);
        z-index: 28;
      }

      .auth-modal.hidden {
        display: none;
      }

      .auth-card {
        width: min(420px, 100%);
        padding: 24px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid rgba(23, 32, 45, 0.08);
        box-shadow: 0 24px 70px rgba(23, 32, 45, 0.18);
      }

      .auth-card h3 {
        margin-bottom: 10px;
      }

      .auth-copy {
        margin: 0 0 14px;
        color: var(--muted);
      }

      .auth-form {
        display: grid;
        gap: 12px;
      }

      .auth-form label {
        display: grid;
        gap: 8px;
      }

      .auth-form span {
        font-size: 0.88rem;
        color: var(--muted);
      }

      .auth-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
      }

      .auth-error {
        min-height: 20px;
        margin: 0;
        color: #b42318;
        font-size: 0.88rem;
      }

      .lightbox {
        position: fixed;
        inset: 0;
        background: rgba(7, 10, 14, 0.82);
        display: grid;
        place-items: center;
        padding: 32px;
        z-index: 30;
      }

      .lightbox.hidden {
        display: none;
      }

      .lightbox img {
        max-width: min(90vw, 960px);
        max-height: calc(100vh - 96px);
        border-radius: 24px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.36);
      }

      .lightbox-close {
        position: fixed;
        top: 22px;
        right: 22px;
      }

      @media (max-width: 760px) {
        .page-shell {
          width: min(100% - 12px, 1440px);
          padding-top: 10px;
        }

        .hero,
        .panel-head,
        .compact-head {
          flex-direction: column;
        }

        .hero {
          align-items: stretch;
          gap: 8px;
        }

        .hero-brand {
          align-items: flex-start;
        }

        .table-head {
          flex-direction: row;
          align-items: center;
          gap: 6px;
        }

        .fx-controls {
          display: grid;
          grid-template-columns: 1fr;
        }

        .summary-strip {
          gap: 6px;
        }

        .panel-form,
        .panel-table {
          padding: 12px;
        }

        .expense-table thead th,
        .expense-table tbody td {
          padding: 12px 10px;
        }

        .row-action-button {
          width: 28px;
          height: 28px;
          border-radius: 9px;
        }

        .fx-fab {
          right: 10px;
          bottom: 10px;
          width: 42px;
          height: 42px;
        }

        .fx-panel {
          right: 10px;
          bottom: 62px;
          width: calc(100vw - 20px);
        }
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-brand">
          <h1><span class="brand-dav">DAV</span> 建设 · 斯里兰卡 · 台账</h1>
        </div>
        <div class="hero-actions">
          <button
            type="button"
            class="entry-toggle"
            id="entryToggle"
            aria-expanded="false"
            aria-controls="entryDrawer"
            aria-label="登录后录入报销"
          >
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M14 4H7.5C6.67 4 6 4.67 6 5.5V18.5C6 19.33 6.67 20 7.5 20H14"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M11 12H20"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
              <path
                d="M17 9L20 12L17 15"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
          <div
            class="connection-indicator"
            id="connectionBadge"
            role="status"
            aria-live="polite"
            aria-label="Supabase 状态"
            title="Supabase 状态"
          >
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M6 7.5C6 6.12 8.69 5 12 5C15.31 5 18 6.12 18 7.5C18 8.88 15.31 10 12 10C8.69 10 6 8.88 6 7.5Z"
                stroke="currentColor"
                stroke-width="1.7"
              />
              <path d="M6 7.5V16.5C6 17.88 8.69 19 12 19C15.31 19 18 17.88 18 16.5V7.5" stroke="currentColor" stroke-width="1.7"/>
              <path d="M6 12C6 13.38 8.69 14.5 12 14.5C15.31 14.5 18 13.38 18 12" stroke="currentColor" stroke-width="1.7"/>
            </svg>
          </div>
        </div>
      </header>

      <main class="dashboard">

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function escapeCsv(value) {
        const text = String(value ?? '');
        if (/[",\n]/.test(text)) {
          return '"' + text.replaceAll('"', '""') + '"';

        return text;
      }

      function canvasToBlob(canvas, type, quality) {
        return new Promise(function (resolve, reject) {
          canvas.toBlob(function (blob) {
            if (!blob) {
              reject(new Error('图片压缩失败'));
              return;
            }
            resolve(blob);
          }, type, quality);
        });
      }

      function loadImageElement(file) {
        return new Promise(function (resolve, reject) {
          const objectUrl = URL.createObjectURL(file);
          const image = new Image();
          image.onload = function () {
            URL.revokeObjectURL(objectUrl);
            resolve(image);
          };
          image.onerror = function () {
            URL.revokeObjectURL(objectUrl);
            reject(new Error('读取图片失败'));
          };
          image.src = objectUrl;
        });
      }

      async function compressImageToLimit(file, maxBytes) {
        const image = await loadImageElement(file);
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d', { alpha: false });
        if (!context) {
          throw new Error('浏览器不支持图片压缩');
        }

        const sourceWidth = image.naturalWidth || image.width;
        const sourceHeight = image.naturalHeight || image.height;
        let scale = 1;
        let quality = 0.9;
        let bestBlob = null;

        for (let step = 0; step < 24; step += 1) {
          const width = Math.max(160, Math.round(sourceWidth * scale));
          const height = Math.max(160, Math.round(sourceHeight * scale));
          canvas.width = width;
          canvas.height = height;
          context.fillStyle = '#ffffff';
          context.fillRect(0, 0, width, height);
          context.drawImage(image, 0, 0, width, height);

          const blob = await canvasToBlob(canvas, 'image/jpeg', quality);
          if (!bestBlob || blob.size < bestBlob.size) {
            bestBlob = blob;
          }
          if (blob.size <= maxBytes) {
            bestBlob = blob;
            break;
          }

          if (quality > 0.42) {
            quality -= 0.1;
          } else {
            scale *= 0.82;
          }

          if (scale < 0.15 && quality <= 0.42) {
            break;
          }
        }

        if (!bestBlob || bestBlob.size > maxBytes) {
          throw new Error('图片压缩后仍超过 1MB，请选择更小的图片');
        }

        const fileBase = (file.name.replace(/\.[^/.]+$/, '') || 'image').slice(0, 80);
        return new File([bestBlob], fileBase + '.jpg', {
          type: 'image/jpeg',
          lastModified: Date.now(),
        });
      }

      async function prepareUploadFile(file) {
        if (!file) {
          return { file: null, compressed: false };
        }

        if (!file.type.startsWith('image/')) {
          return { file: file, compressed: false };
        }

        if (file.size <= MAX_UPLOAD_IMAGE_BYTES) {
          return { file: file, compressed: false };
        }

        const compressedFile = await compressImageToLimit(file, MAX_UPLOAD_IMAGE_BYTES);
        return { file: compressedFile, compressed: true };
      }

              const rawStatus = String(record.status ?? '').trim();
              const statusText = rawStatus || '待处理';
              const statusClass = rawStatus ? 'is-ok' : 'is-pending';
              const isStatusUpdating = state.updatingStatusIds.has(String(record.id));
              const statusCell = state.entryAuthorized
                ? (function () {
                    const mergedOptions = STATUS_OPTIONS.includes(statusText)
                      ? STATUS_OPTIONS
                      : STATUS_OPTIONS.concat([statusText]);
                    const optionsHtml = mergedOptions
                      .map(function (optionLabel) {
                        return (
                          '<option value="' +
                          escapeHtml(optionLabel) +
                          '"' +
                          (optionLabel === statusText ? ' selected' : '') +
                          '>' +
                          escapeHtml(optionLabel) +
                          '</option>'
                        );
                      })
                      .join('');
                    return (
                      '<select class="status-select" data-status-id="' +
                      escapeHtml(record.id) +
                      '" data-current-status="' +
                      escapeHtml(statusText) +
                      '"' +
                      (isStatusUpdating ? ' disabled' : '') +
                      '>' +
                      optionsHtml +
                      '</select>'
                    );
                  })()
                : '<span class="status-badge ' +
                  statusClass +
                  '">' +
                  escapeHtml(statusText) +
                  '</span>';

              return (
                '<tr>' +
                '<td>' +
                escapeHtml(record.id) +
                '</td>' +
                '<td class="person-cell">' +
                reimburserCell +
                '</td>' +
                '<td>' +
                escapeHtml(formatDate(record.expense_date)) +
                '</td>' +
                '<td>' +
                escapeHtml(record.expense_type) +
                '</td>' +
                '<td>' +
                escapeHtml(record.project_name) +
                '</td>' +
                '<td class="amount-cell">' +
                escapeHtml(formatAmount(record.amount_lkr)) +
                '</td>' +
                '<td>' +
                imageCell +
                '</td>' +
                (state.entryAuthorized ? '<td class="action-column">' + actionsCell + '</td>' : '') +
                '<td class="status-cell">' +
                statusCell +
                '</td>' +
                '</tr>'
              );
            })
            .join('');
        }

        const total = records.reduce(function (sum, record) {
          return sum + Number(record.amount_lkr || 0);
        }, 0);

        elements.recordCount.textContent = String(records.length);
        elements.totalAmount.textContent = formatAmount(total);
      }

      async function loadRecords(options = {}) {
        const silent = Boolean(options.silent);
        if (!supabaseClient) {
          state.records = [];
          const message = isConfigured
            ? 'Supabase SDK 未正常加载，数据功能已跳过。'
            : '请先在 index.html 内填写 Supabase 配置。';
          if (!silent) {
            setStatus(message);
          }
          renderTable([], message);
          return;
        }

        if (!silent) {
          setStatus('正在加载记录...');
        }

        let query = supabaseClient
          .from('reimbursements')
          .select('*')
          .order('expense_date', { ascending: false })
          .order('id', { ascending: false });

        if (elements.filterStartDate.value) {
          query = query.gte('expense_date', elements.filterStartDate.value);
        }

        if (elements.filterEndDate.value) {
          query = query.lte('expense_date', elements.filterEndDate.value);
        }

        const result = await query;

        if (result.error) {
          console.error(result.error);
          state.records = [];
          setStatus('加载失败：' + result.error.message);
          renderTable([], '数据加载失败，请检查 Supabase 配置与表结构。');
          return;
        }

        state.records = result.data || [];
        renderTable(state.records);
        if (!silent) {
          setStatus('已加载 ' + state.records.length + ' 条记录');
        }
      }

      async function uploadReceipt(file) {
        if (!file) {
          return { path: null, url: null };
        }

        const extension = file.name.split('.').pop() || 'jpg';
        const safeExtension = extension.toLowerCase().replace(/[^a-z0-9]/g, '') || 'jpg';
        const filePath =
          getLocalYearMonthString() + '/' + Date.now() + '-' + crypto.randomUUID() + '.' + safeExtension;

        const uploadResult = await supabaseClient.storage.from(APP_CONFIG.STORAGE_BUCKET).upload(filePath, file, {
          cacheControl: '3600',
          upsert: false,
        });

        if (uploadResult.error) {
          throw new Error('图片上传失败：' + uploadResult.error.message);
        }

        const publicUrlData = supabaseClient.storage.from(APP_CONFIG.STORAGE_BUCKET).getPublicUrl(filePath);

        return {
          path: filePath,
          url: publicUrlData.data.publicUrl,
        };
      }

      async function removeStoredImage(imagePath) {
        if (!imagePath) return;
        const result = await supabaseClient.storage.from(APP_CONFIG.STORAGE_BUCKET).remove([imagePath]);
        if (result.error) {
          console.warn('旧图片删除失败:', result.error.message);
        }
      }

      async function createRecord(event) {
        event.preventDefault();

        if (!state.entryAuthorized) {
          openAuthModal();
          setStatus('请先通过身份验证，再执行录入与修改');
          return;
        }

        if (!supabaseClient) {
          setStatus('Supabase 未配置，无法保存。');
          return;
        }

        const formData = new FormData(elements.form);
        const file = elements.receiptImage.files && elements.receiptImage.files[0];
        const isEditing = Boolean(state.editingRecordId);
        const currentRecord = isEditing
          ? state.records.find(function (item) {
              return String(item.id) === String(state.editingRecordId);
            })
          : null;
        let compressed = false;

        setSubmitState(true);
        setStatus(isEditing ? '正在更新记录...' : '正在保存记录...');

        try {
          const prepared = await prepareUploadFile(file);
          compressed = prepared.compressed;
          const uploaded = prepared.file ? await uploadReceipt(prepared.file) : { path: null, url: null };

          const basePayload = {
            expense_date: formData.get('expense_date'),
            expense_type: String(formData.get('expense_type') || '').trim(),
            project_name: String(formData.get('project_name') || '').trim(),
            amount_lkr: Number(formData.get('amount_lkr') || 0),
          };

          if (isEditing) {
            const updatePayload = Object.assign({}, basePayload);
            if (prepared.file) {
              updatePayload.image_path = uploaded.path;
              updatePayload.image_url = uploaded.url;
            }

            const updateResult = await supabaseClient
              .from('reimbursements')
              .update(updatePayload)
              .eq('id', state.editingRecordId);
            if (updateResult.error) {
              throw new Error(updateResult.error.message);
            }

            if (prepared.file && currentRecord && currentRecord.image_path) {
              await removeStoredImage(currentRecord.image_path);
            }
          } else {
            const createPayload = Object.assign({}, basePayload, {
              image_path: uploaded.path,
              image_url: uploaded.url,
            });
            const insertResult = await supabaseClient.from('reimbursements').insert(createPayload);
            if (insertResult.error) {
              throw new Error(insertResult.error.message);
            }
          }

          resetFormToCreateMode();
          toggleEntryDrawer(false);
          await loadRecords();
          setStatus(
            (isEditing ? '记录已更新' : '记录已保存') + (compressed ? '（图片已自动压缩至 1MB 以下）' : ''),
          );
        } catch (error) {
          console.error(error);
          setStatus(error instanceof Error ? error.message : '保存失败');
        } finally {
          setSubmitState(false);
        }
      }

      function verifyEntryAccess(event) {
        event.preventDefault();
        const answer = elements.authInput.value.trim();

        if (answer !== 'X_Rey') {
          elements.authError.textContent = '口令不正确，无法展开录入报销。';
          elements.authInput.focus();
          elements.authInput.select();
          setStatus('身份验证未通过');
          return;
        }

        state.entryAuthorized = true;
        closeAuthModal();
        updateTableAuthState();
        renderTable(state.records);
        toggleEntryDrawer(true);
        setStatus('身份验证通过，可以录入报销');
      }

      async function deleteRecord(recordId) {
        if (!state.entryAuthorized) {
          openAuthModal();
          setStatus('请先通过身份验证，再执行删除');
          return;
        }

        const record = state.records.find(function (item) {
          return String(item.id) === String(recordId);
        });
        if (!record) {
          setStatus('未找到目标记录');
          return;
        }

        const confirmed = window.confirm('确认删除 No.' + record.id + ' 吗？该操作不可恢复。');
        if (!confirmed) return;

        setStatus('正在删除记录...');
        const result = await supabaseClient.from('reimbursements').delete().eq('id', record.id);
        if (result.error) {
          setStatus('删除失败：' + result.error.message);
          return;
        }

        if (record.image_path) {
          await removeStoredImage(record.image_path);
        }

        if (String(state.editingRecordId) === String(record.id)) {
          resetFormToCreateMode();
        }

        await loadRecords();
        setStatus('记录已删除');
      }

      async function updateRecordStatus(recordId, nextStatus) {
        if (!state.entryAuthorized) {
          openAuthModal();
          setStatus('请先通过身份验证，再修改状态');
          return false;
        }

        if (!supabaseClient) {
          setStatus('Supabase 未配置，无法更新状态。');
          return false;
        }

        const record = state.records.find(function (item) {
          return String(item.id) === String(recordId);
        });
        if (!record) {
          setStatus('未找到目标记录');
          return false;
        }

        const normalized = String(nextStatus || '').trim() || '待处理';
        const rowId = String(record.id);
        state.updatingStatusIds.add(rowId);
        renderTable(state.records);

        try {
          const result = await supabaseClient
            .from('reimbursements')
            .update({ status: normalized })
            .eq('id', record.id);

          if (result.error) {
            throw new Error(result.error.message);
          }

          record.status = normalized;
          setStatus('状态已更新：No.' + record.id);
          return true;
        } catch (error) {
          console.error(error);
          setStatus('状态更新失败：' + (error instanceof Error ? error.message : '未知错误'));
          return false;
        } finally {
          state.updatingStatusIds.delete(rowId);
          renderTable(state.records);
        }
      }

      async function updateRecordReimburser(recordId, nextName) {
        if (!state.entryAuthorized) {
          openAuthModal();
          setStatus('请先通过身份验证，再修改报销人');
          return false;
        }

        if (!supabaseClient) {
          setStatus('Supabase 未配置，无法更新报销人。');
          return false;
        }

        const record = state.records.find(function (item) {
          return String(item.id) === String(recordId);
        });
        if (!record) {
          setStatus('未找到目标记录');
          return false;
        }

        const normalized = String(nextName || '').trim();
        const rowId = String(record.id);
        state.updatingPersonIds.add(rowId);
        renderTable(state.records);

        try {
          const result = await supabaseClient
            .from('reimbursements')
            .update({ reimburser: normalized || null })
            .eq('id', record.id);

          if (result.error) {
            throw new Error(result.error.message);
          }

          record.reimburser = normalized || null;
          setStatus('报销人已更新：No.' + record.id);
          return true;
        } catch (error) {
          console.error(error);
          setStatus('报销人更新失败：' + (error instanceof Error ? error.message : '未知错误'));
          return false;
        } finally {
          state.updatingPersonIds.delete(rowId);
          renderTable(state.records);
        }
      }

      function downloadCsv() {
        if (!state.records.length) {
          setStatus('没有可下载的数据');
          return;
        }

        const header = ['No', '报销人', '日期', '类型', '项目', '金额（LKR）', '图片 URL', '状态'];
        const rows = state.records.map(function (record) {
          return [
            record.id,
            record.reimburser || '',
            record.expense_date,
            record.expense_type,
            record.project_name,
            record.amount_lkr,
            record.image_url || '',
            record.status || '',
          ];
        });

        const csv = [header].concat(rows)
          .map(function (row) {
            return row
              .map(function (value) {
                return escapeCsv(value);
              })
              .join(',');
          })
          .join('\n');

        const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        const stamp = (elements.filterStartDate.value || 'all') + '_' + (elements.filterEndDate.value || 'all');
        link.href = url;
        link.download = 'dav-reimburse-' + stamp + '.csv';
        link.click();
        URL.revokeObjectURL(url);
        setStatus('CSV 已下载');
      }

      function openLightbox(imageUrl) {
        elements.lightboxImage.src = imageUrl;
        elements.lightbox.classList.remove('hidden');
      }

      function closeLightbox() {
        elements.lightbox.classList.add('hidden');
        elements.lightboxImage.src = '';
      }

      function toggleFxPanel(forceOpen) {
        const shouldOpen = typeof forceOpen === 'boolean' ? forceOpen : !elements.fxPanel.classList.contains('is-open');
        elements.fxPanel.classList.toggle('is-open', shouldOpen);
        elements.fxPanel.setAttribute('aria-hidden', String(!shouldOpen));
        elements.fxToggle.setAttribute('aria-expanded', String(shouldOpen));
      }

      async function fetchRates(baseCurrency) {
        const cached = state.rateCache.get(baseCurrency);
        if (cached && Date.now() - cached.fetchedAt < FX_CACHE_TTL) {
          return cached;
        }

        const response = await fetch(RATE_API_ROOT + '/' + baseCurrency);
        if (!response.ok) {
          throw new Error('汇率接口请求失败');
        }

        const data = await response.json();
        if (data.result !== 'success') {
          throw new Error('汇率接口返回异常');
        }

        const payload = {
          base: data.base_code,
          updatedAt: data.time_last_update_utc,
          rates: data.rates,
          fetchedAt: Date.now(),
        };

        state.rateCache.set(baseCurrency, payload);
        return payload;
      }

      async function updateFxResults() {
        const amount = Number(elements.fxAmount.value || 0);
        const baseCurrency = elements.fxBaseCurrency.value;
        elements.fxMeta.textContent = '汇率数据加载中...';

        try {
          const ratePayload = await fetchRates(baseCurrency);
          elements.fxResults.innerHTML = FX_CURRENCIES.map(function (currency) {
            const rate = ratePayload.rates[currency];
            const value = currency === baseCurrency ? amount : rate ? amount * rate : null;
            const currencyLabel = FX_LABELS[currency] || currency;
            return (
              '<article class="fx-card">' +
              '<span>' +
              currencyLabel +
              '</span>' +
              '<strong>' +
              (value === null ? '--' : numberFormatter.format(value)) +
              '</strong>' +
              '</article>'
            );
          }).join('');
          const baseLabel = FX_LABELS[ratePayload.base] || ratePayload.base;
          elements.fxMeta.textContent = '基准：' + baseLabel + ' · 更新于 ' + ratePayload.updatedAt;
        } catch (error) {
          console.error(error);
          elements.fxResults.innerHTML = FX_CURRENCIES.map(function (currency) {
            const currencyLabel = FX_LABELS[currency] || currency;
            return '<article class="fx-card"><span>' + currencyLabel + '</span><strong>--</strong></article>';
          }).join('');
          elements.fxMeta.textContent = error instanceof Error ? error.message : '汇率加载失败';
        }
      }

      async function handleTableAction(action, recordId) {
        if (!state.entryAuthorized) {
          openAuthModal();
          setStatus('请先输入口令 X_Rey，通过验证后可使用 CRUD');
          return;
        }

        const record = state.records.find(function (item) {
          return String(item.id) === String(recordId);
        });
        if (!record) {
          setStatus('未找到目标记录');
          return;
        }

        if (action === 'edit') {
          startEditMode(record);
          return;
        }

        if (action === 'delete') {
          await deleteRecord(record.id);
        }
      }

      function startAutoRefresh() {
        if (state.autoRefreshTimer) {
          window.clearInterval(state.autoRefreshTimer);
        }

        state.autoRefreshTimer = window.setInterval(function () {
          if (document.visibilityState === 'visible') {
            loadRecords({ silent: true }).catch(function (error) {
              console.error('自动刷新失败:', error);
            });
          }
        }, AUTO_REFRESH_MS);
      }

      function bindEvents() {
        elements.entryToggle.addEventListener('click', handleEntryToggle);
        elements.authForm.addEventListener('submit', verifyEntryAccess);
        elements.authCancel.addEventListener('click', function () {
          closeAuthModal();
        });
        elements.authModal.addEventListener('click', function (event) {
          if (event.target === elements.authModal) {
            closeAuthModal();
          }
        });
        elements.form.addEventListener('submit', createRecord);
        elements.cancelEditButton.addEventListener('click', function () {
          resetFormToCreateMode();
          setStatus('已取消编辑，恢复新增模式');
        });
        elements.receiptImage.addEventListener('change', function () {
          renderPreview(elements.receiptImage.files && elements.receiptImage.files[0]);
        });
        elements.filterButton.addEventListener('click', loadRecords);
        elements.resetButton.addEventListener('click', async function () {
          elements.filterStartDate.value = '';
          elements.filterEndDate.value = '';
          await loadRecords();
        });
        elements.downloadButton.addEventListener('click', downloadCsv);

        elements.expenseTableBody.addEventListener('click', async function (event) {
          const actionTarget = event.target.closest('[data-action]');
          if (actionTarget) {
            await handleTableAction(actionTarget.dataset.action, actionTarget.dataset.id);
            return;
          }

          const imageTarget = event.target.closest('[data-image-url]');
          if (!imageTarget) return;
          openLightbox(imageTarget.dataset.imageUrl);
        });

        elements.expenseTableBody.addEventListener('change', async function (event) {
          const personInput = event.target.closest('[data-person-id]');
          if (personInput) {
            const previousPerson = personInput.dataset.currentPerson || '';
            const success = await updateRecordReimburser(personInput.dataset.personId, personInput.value);
            if (!success) {
              personInput.value = previousPerson;
            }
            return;
          }

          const statusSelect = event.target.closest('[data-status-id]');
          if (!statusSelect) return;

          const previousValue = statusSelect.dataset.currentStatus || '';
          const success = await updateRecordStatus(statusSelect.dataset.statusId, statusSelect.value);
          if (!success) {
            statusSelect.value = previousValue;
          }
        });

        elements.lightbox.addEventListener('click', function (event) {
          if (event.target === elements.lightbox || event.target === elements.lightboxClose) {
            closeLightbox();
          }
        });

        elements.fxToggle.addEventListener('click', async function () {
          const willOpen = !elements.fxPanel.classList.contains('is-open');
          toggleFxPanel(willOpen);
          if (willOpen) {
            await updateFxResults();
          }
        });

        elements.fxClose.addEventListener('click', function () {
          toggleFxPanel(false);
        });
        elements.fxAmount.addEventListener('input', updateFxResults);
        elements.fxBaseCurrency.addEventListener('change', updateFxResults);

        document.addEventListener('visibilitychange', function () {
          if (document.visibilityState === 'visible') {
            loadRecords({ silent: true }).catch(function (error) {
              console.error('页面激活刷新失败:', error);
            });
          }
        });

        window.addEventListener('beforeunload', function () {
          if (state.autoRefreshTimer) {
            window.clearInterval(state.autoRefreshTimer);
          }
        });

        document.addEventListener('keydown', function (event) {
          if (event.key === 'Escape') {
            closeAuthModal();
            closeLightbox();
            toggleFxPanel(false);
            toggleEntryDrawer(false);
          }
        });
      }

      async function init() {
        setConnectionState(Boolean(supabaseClient));
        updateTableAuthState();
        resetFormToCreateMode();
        bindEvents();
        startAutoRefresh();
        await Promise.allSettled([updateFxResults(), loadRecords()]);
      }

      init();
    </script>
  </body>
</html>
